<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Speaking Exam - O'qituvchi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-50 font-['Inter']">
    <div class="max-w-6xl mx-auto py-12 px-4">
        <div class="flex justify-between items-center mb-8">
            <div class="flex items-center gap-4">
                <a href="index.html" class="p-2 hover:bg-slate-100 rounded-full transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                </a>
                <h1 class="text-3xl font-bold text-slate-900">Admin Panel</h1>
            </div>
            <div id="submission-count" class="bg-indigo-100 text-indigo-700 px-4 py-2 rounded-full text-sm font-semibold">
                0 ta topshiriq
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Submissions List -->
            <div id="submissions-list" class="lg:col-span-1 space-y-4">
                <!-- List items will be injected here -->
            </div>

            <!-- Grading Area -->
            <div id="grading-area" class="lg:col-span-2">
                <div id="empty-state" class="h-full flex items-center justify-center text-slate-400 border-2 border-dashed border-slate-200 rounded-3xl p-12">
                    Baholash uchun chapdan talabani tanlang
                </div>
                
                <div id="grading-form" class="hidden glass p-8 rounded-3xl sticky top-8">
                    <h2 id="selected-student-name" class="text-2xl font-bold mb-6 flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-indigo-600"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                        Talaba javobi
                    </h2>

                    <div class="mb-8 p-6 bg-slate-900 rounded-2xl">
                        <audio id="admin-player" controls class="w-full invert"></audio>
                    </div>

                    <div class="space-y-6">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-2 flex items-center gap-2">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-amber-500"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                                Ball (0-10)
                            </label>
                            <input type="range" id="score-range" min="0" max="10" step="1" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-indigo-600">
                            <div class="text-center mt-2 font-bold text-2xl text-indigo-600" id="score-display">0</div>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-2 flex items-center gap-2">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-indigo-500"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                                Fikr-mulohaza (Feedback)
                            </label>
                            <textarea id="feedback-text" rows="4" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition-all" placeholder="Talabaga tavsiyalaringizni yozing..."></textarea>
                        </div>

                        <button id="save-btn" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-semibold flex items-center justify-center gap-2 hover:bg-indigo-700 transition-all shadow-lg">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                            Natijani saqlash
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
